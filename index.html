<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 Calculadora de Emissão de CO₂</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header header--main">
      <div class="header__content">
        <h1 class="header__title">🌿 Calculadora de Emissão de CO₂</h1>
        <p class="header__subtitle">Calcule a emissão de carbono por viagem e compare diferentes modos de transporte.</p>
      </div>
    </header>

  <main class="main-content">
    <section class="calculator calculator--section">
      <form id="calculator-form" class="calculator__form" autocomplete="off">
        <div class="calculator__field-group">
          <label class="calculator__label" for="origin">Origem</label>
          <input class="calculator__input" type="text" id="origin" name="origin" list="cities-list" placeholder="Digite a cidade de origem">
        </div>

        <div class="calculator__field-group">
          <label class="calculator__label" for="destination">Destino</label>
          <input class="calculator__input" type="text" id="destination" name="destination" list="cities-list" placeholder="Digite a cidade de destino">
        </div>

        <datalist id="cities-list"></datalist>

        <div class="calculator__field-group">
          <label class="calculator__label" for="distance">Distância (km)</label>
          <input class="calculator__input calculator__input--readonly" type="number" id="distance" name="distance" readonly>
          <p class="calculator__help-text">A distância será preenchida automaticamente</p>
        </div>

        <div class="calculator__field-group calculator__field-group--checkbox">
          <input class="calculator__checkbox" type="checkbox" id="manual-distance" name="manual-distance">
          <label class="calculator__checkbox-label" for="manual-distance">Inserir distância manualmente</label>
        </div>

        <fieldset class="calculator__transport-controls">
          <legend class="calculator__legend">Modo de Transporte</legend>

          <div class="transport-grid">
            <label class="transport-card transport-card--bicycle" for="transport-bicycle">
              <input type="radio" id="transport-bicycle" name="transport" value="bicycle">
              <span class="transport-card__icon">🚲</span>
              <span class="transport-card__text">Bicicleta</span>
            </label>

            <label class="transport-card transport-card--car" for="transport-car">
              <input type="radio" id="transport-car" name="transport" value="car" checked>
              <span class="transport-card__icon">🚗</span>
              <span class="transport-card__text">Carro</span>
            </label>

            <label class="transport-card transport-card--bus" for="transport-bus">
              <input type="radio" id="transport-bus" name="transport" value="bus">
              <span class="transport-card__icon">🚌</span>
              <span class="transport-card__text">Ônibus</span>
            </label>

            <label class="transport-card transport-card--truck" for="transport-truck">
              <input type="radio" id="transport-truck" name="transport" value="truck">
              <span class="transport-card__icon">🚚</span>
              <span class="transport-card__text">Caminhão</span>
            </label>
          </div>
        </fieldset>

        <button class="calculator__submit button button--primary" type="submit">Calcular Emissão</button>
      </form>
    </section>

    <section id="results" class="results hidden">
      <div id="results-content" class="results__content"></div>
    </section>

    <section id="comparison" class="comparison hidden">
      <div id="comparison-content" class="comparison__content"></div>
    </section>

    <section id="carbon-credits" class="carbon-credits hidden">
      <div id="carbon-credits-content" class="carbon-credits__content"></div>
    </section>
  </main>

  <footer class="footer footer--main">
    <p class="footer__text">Desenvolvido com ❤️ para a DIO | Projeto GitHub Copilot do José hermes</p>
  </footer>
  </div>

  <script src="js/routes-data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
